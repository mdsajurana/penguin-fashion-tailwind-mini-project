<!DOCTYPE html>

    <title>Penguin Fashion</title>

                    class="text-[#FABE4C] text-[80px] mx-4 md:leading-[85px] max-sm:leading-[50px] max-sm:text-[60px] xl:leading-[50px]">

                    printing

                    <i class="fa-solid fa-cart-shopping"></i>BUY NOW</button>
            </div>
            <div>
                <img src="assets/images/model.png" alt="" class="max-sm:w-[360px] max-sm:h-[367px]">
            </div>
        </div>

    <main>

    </main>
